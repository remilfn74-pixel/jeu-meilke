<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino Vision Scanner - Capture</title>
    <style>
        :root {
            --primary: #00f0ff;
            --primary-dark: #00a8b5;
            --bg-dark: #0a0e17;
            --card-bg: #141d2f;
            --text-main: #ffffff;
            --text-muted: #7687a1;
            --success: #39ff14;
            --error: #ff3131;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
            margin-bottom: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-box {
            text-align: center;
            flex: 1;
        }

        .stat-box:not(:last-child) {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-val {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-val.score {
            color: var(--success);
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
        }

        .stat-lbl {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Zone d'affichage Caméra / Photo */
        .viewport-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(0, 240, 255, 0.2);
            margin-bottom: 20px;
        }

        video, #photo-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #photo-preview {
            display: none; /* Caché par défaut, affiché uniquement au moment du scan */
        }

        .scan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 20px solid rgba(10, 14, 23, 0.6);
            pointer-events: none;
            box-sizing: border-box;
        }

        .scan-reticle {
            position: absolute;
            top: 20px; bottom: 20px; left: 20px; right: 20px;
            border: 2px dashed var(--primary);
            opacity: 0.4;
        }

        /* Boutons */
        .btn-action {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 240, 255, 0.5);
        }

        .btn-action:disabled {
            background: #2a3547;
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #reset-btn {
            background: linear-gradient(135deg, #7687a1, #4a5568);
            color: white;
            margin-top: 10px;
            display: none; /* Affiché seulement après un scan */
            box-shadow: none;
        }

        .status-panel {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.15);
            font-size: 14px;
            line-height: 1.5;
            border-left: 4px solid var(--primary);
        }

        .status-panel.success { border-left-color: var(--success); background: rgba(57, 255, 20, 0.05); }
        .status-panel.error { border-left-color: var(--error); background: rgba(255, 49, 49, 0.05); }
        canvas { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Arduino Vision Scanner</h1>
        <p class="subtitle">Prenez une photo pour analyser et marquer des points</p>
    </header>

    <div class="main-container">
        <!-- Dashboard de Score -->
        <div class="dashboard">
            <div class="stat-box">
                <div class="stat-val score" id="score-display">0</div>
                <div class="stat-lbl">Points</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="count-display">0</div>
                <div class="stat-lbl">Objets uniques</div>
            </div>
        </div>

        <!-- Zone d'affichage (Vidéo ou Photo figée) -->
        <div class="viewport-wrapper">
            <video id="video" autoplay playsinline></video>
            <img id="photo-preview" alt="Capture à analyser">
            <div class="scan-overlay"><div class="scan-reticle"></div></div>
        </div>

        <!-- Boutons de contrôle -->
        <button id="scan-btn" class="btn-action" onclick="capturerEtAnalyser()">Scanner l'objet</button>
        <button id="reset-btn" class="btn-action" onclick="relancerCamera()">Prendre une nouvelle photo</button>

        <!-- Retour d'information -->
        <div id="status-box" class="status-panel">
            Démarrage de la caméra...
        </div>
    </div>

    <canvas id="capture-canvas"></canvas>

    <script>
        let video = document.getElementById('video');
        let photoPreview = document.getElementById('photo-preview');
        let canvas = document.getElementById('capture-canvas');
        let scanBtn = document.getElementById('scan-btn');
        let resetBtn = document.getElementById('reset-btn');
        let statusBox = document.getElementById('status-box');

        // Clé API Gemini intégrée
        const GEMINI_API_KEY = "AIzaSyAUOFfuqz-f5qOXxssqmMn00bSOZgpBdc4";

        let score = 0;
        let objetsScannes = new Set();
        let currentStream = null;

        // Configuration de la caméra arrière
        async function initCamera() {
            try {
                const constraints = {
                    video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } }
                };
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                statusBox.className = "status-panel";
                statusBox.innerText = "Caméra active ! Cadrez votre composant et cliquez sur Scanner.";
            } catch (err) {
                statusBox.className = "status-panel error";
                statusBox.innerText = "Impossible d'accéder à la caméra arrière.";
                console.error(err);
            }
        }

        async function capturerEtAnalyser() {
            if (!currentStream) return;

            // 1. Prendre la photo immédiatement (figer l'image)
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            let ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            let base64Data = canvas.toDataURL('image/jpeg').split(',')[1];

            // 2. Afficher la photo figée à la place de la vidéo
            photoPreview.src = canvas.toDataURL('image/jpeg');
            video.style.display = 'none';
            photoPreview.style.display = 'block';

            // 3. Couper la caméra pour économiser la batterie du téléphone
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;

            // 4. Mettre à jour l'interface (boutons)
            scanBtn.style.display = 'none';
            resetBtn.style.display = 'block';
            statusBox.className = "status-panel";
            statusBox.innerText = "Photo capturée ! Analyse Gemini AI en cours... ⏳";

            // 5. Envoi à l'IA
            const prompt = "Analyse cette image. Si tu distingues clairement une carte programmable (Arduino Uno, Nano, Mega, ESP32, Raspberry Pi Pico) ou un module/capteur électronique identifiable (ex: Capteur ultrason HC-SR04, Écran LCD, Servomoteur, Module RFID), réponds STRICTEMENT avec son nom usuel de manière concise (max 4 mots, ex: 'Arduino Uno' ou 'Capteur Ultrason HC-SR04'). Si l'élément n'est pas un composant électronique bien défini, ou si la photo est trop floue/ambiguë, réponds par le mot unique : INCONNU";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

            try {
                let response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }],
                        generationConfig: { temperature: 0.1 }
                    })
                });

                if (!response.ok) throw new Error("Erreur de réponse");

                let data = await response.json();
                let resultText = data.candidates[0].content.parts[0].text.trim();
                
                processVisionResult(resultText);
            } catch (error) {
                statusBox.className = "status-panel error";
                statusBox.innerText = "Erreur lors de l'analyse. Vérifiez votre connexion internet.";
                console.error(error);
            }
        }

        function processVisionResult(rawText) {
            let cleanedName = rawText.replace(/[\*#_]/g, '').trim();

            if (cleanedName.toUpperCase().includes("INCONNU") || cleanedName.length < 2) {
                statusBox.className = "status-panel error";
                statusBox.innerText = "❌ Aucun composant Arduino reconnu sur la photo. Cliquez ci-dessous pour réessayer !";
            } else {
                statusBox.className = "status-panel success";
                
                if (!objetsScannes.has(cleanedName)) {
                    objetsScannes.add(cleanedName);
                    score += 100;
                    
                    document.getElementById('score-display').innerText = score;
                    document.getElementById('count-display').innerText = objetsScannes.size;
                    
                    statusBox.innerHTML = `🎉 <strong>Nouveau composant découvert !</strong><br>+100 points : <em>${cleanedName}</em>`;
                } else {
                    statusBox.innerHTML = `🔍 <strong>Déjà scanné :</strong> ${cleanedName}<br><span style="color: var(--text-muted)">Aucun point attribué pour un doublon.</span>`;
                }
            }
        }

        async function relancerCamera() {
            // Rebasculer l'affichage sur la vidéo en direct
            photoPreview.style.display = 'none';
            video.style.display = 'block';
            
            // Réinitialiser les boutons
            resetBtn.style.display = 'none';
            scanBtn.style.display = 'block';
            
            // Relancer le flux vidéo
            await initCamera();
        }

        // Lancement de la caméra au démarrage du site
        initCamera();
    </script>
</body>
</html>
