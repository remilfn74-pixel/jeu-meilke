<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino Vision Scanner - Multijoueur</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #00f0ff;
            --primary-dark: #00a8b5;
            --bg-dark: #0a0e17;
            --card-bg: #141d2f;
            --text-main: #ffffff;
            --text-muted: #7687a1;
            --success: #39ff14;
            --error: #ff3131;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 500px; }
        h1 { font-size: 24px; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); text-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
        p.subtitle { color: var(--text-muted); font-size: 14px; margin-top: 5px; }
        
        .main-container {
            width: 100%; max-width: 500px; background: var(--card-bg);
            border: 1px solid rgba(0, 240, 255, 0.1); border-radius: 16px;
            padding: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
        input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: white; font-size: 16px; transition: 0.2s;
        }
        input:focus { border-color: var(--primary); outline: none; }

        .dashboard { display: flex; justify-content: space-between; background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .stat-box { text-align: center; flex: 1; }
        .stat-box:not(:last-child) { border-right: 1px solid rgba(255, 255, 255, 0.1); }
        .stat-val { font-size: 22px; font-weight: bold; color: var(--primary); }
        .stat-val.score { color: var(--success); }
        .stat-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }

        .viewport-wrapper { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid rgba(0, 240, 255, 0.2); margin-bottom: 20px; }
        video, #photo-preview { width: 100%; height: 100%; object-fit: cover; }
        #photo-preview { display: none; }
        .scan-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 20px solid rgba(10, 14, 23, 0.6); pointer-events: none; }
        .scan-reticle { position: absolute; top: 20px; bottom: 20px; left: 20px; right: 20px; border: 2px dashed var(--primary); opacity: 0.4; }

        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .leaderboard-table th, .leaderboard-table td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .leaderboard-table th { color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
        .leaderboard-table tr:nth-child(1) td { color: #ffd700; font-weight: bold; }
        .leaderboard-table tr:nth-child(2) td { color: #c0c0c0; }
        .leaderboard-table tr:nth-child(3) td { color: #cd7f32; }

        .btn-action {
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #000; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3); margin-top: 10px;
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 240, 255, 0.5); }
        .btn-secondary { background: transparent; border: 1px solid var(--text-muted); color: var(--text-main); box-shadow: none; }
        #reset-btn { display: none; background: linear-gradient(135deg, #7687a1, #4a5568); color: white; }

        .status-panel { margin-top: 20px; padding: 15px; border-radius: 8px; background: rgba(0, 0, 0, 0.15); font-size: 14px; border-left: 4px solid var(--primary); }
        .status-panel.success { border-left-color: var(--success); background: rgba(57, 255, 20, 0.05); }
        .status-panel.error { border-left-color: var(--error); background: rgba(255, 49, 49, 0.05); }
        
        .nav-tabs { display: flex; margin-bottom: 20px; gap: 10px; }
        .tab-btn { flex: 1; padding: 10px; background: rgba(255,255,255,0.05); border: none; color: var(--text-muted); border-radius: 8px; cursor: pointer; }
        .tab-btn.active { background: rgba(0, 240, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        canvas { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>Arduino Vision</h1>
        <p class="subtitle" id="user-tag">Mode Multijoueur & Classement</p>
    </header>

    <div class="main-container">
        
        <div id="screen-auth" class="screen active">
            <div class="form-group">
                <label>Adresse Email</label>
                <input type="email" id="auth-email" placeholder="ton-email@gmail.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="auth-password" placeholder="••••••••">
            </div>
            <button class="btn-action" onclick="connexion()">Se connecter</button>
            <button class="btn-action btn-secondary" onclick="inscription()">Créer un compte</button>
            <div id="auth-status" class="status-panel" style="display:none;"></div>
        </div>

        <div id="screen-game" class="screen">
            <div class="nav-tabs">
                <button id="tab-scan" class="tab-btn active" onclick="switchTab('scan')">📸 Scanner</button>
                <button id="tab-leader" class="tab-btn" onclick="switchTab('leader')">🏆 Classement</button>
            </div>

            <div id="tab-content-scan">
                <div class="dashboard">
                    <div class="stat-box">
                        <div class="stat-val score" id="score-display">0</div>
                        <div class="stat-lbl">Mon Score</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-val" id="count-display">0</div>
                        <div class="stat-lbl">Objets découverts</div>
                    </div>
                </div>

                <div class="viewport-wrapper">
                    <video id="video" autoplay playsinline></video>
                    <img id="photo-preview" alt="Capture">
                    <div class="scan-overlay"><div class="scan-reticle"></div></div>
                </div>

                <button id="scan-btn" class="btn-action" onclick="capturerEtAnalyser()">Scanner l'objet</button>
                <button id="reset-btn" class="btn-action" onclick="relancerCamera()">Prendre une nouvelle photo</button>
            </div>

            <div id="tab-content-leader" style="display:none;">
                <h3 style="font-size:16px; margin-bottom:10px;">🏆 TOP JOUEURS</h3>
                <table class="leaderboard-table">
                    <thead>
                        <tr><th>Rang</th><th>Joueur</th><th>Score</th></tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>

            <div id="status-box" class="status-panel">Initialisation...</div>
            <button class="btn-action btn-secondary" style="margin-top:20px; padding:10px;" onclick="deconnexion()">Se déconnecter</button>
        </div>

    </div>

    <canvas id="capture-canvas"></canvas>

    <script>
        const SUPABASE_URL = "https://iwnqicyyblbnxsnkkiqv.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_u4MSiPhaFpuKQC2eZenLYQ_it_1GAI9";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const GEMINI_API_KEY = "AIzaSyCkamJ7gQtqNj3g6VkqJ7E5DaZOZzUzctY";

        let video = document.getElementById('video');
        let photoPreview = document.getElementById('photo-preview');
        let canvas = document.getElementById('capture-canvas');
        let scanBtn = document.getElementById('scan-btn');
        let resetBtn = document.getElementById('reset-btn');
        let statusBox = document.getElementById('status-box');

        let userSession = null;
        let myScore = 0;
        let objetsScannes = new Set();
        let currentStream = null;

        function changerEcran(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function switchTab(tabName) {
            if(tabName === 'scan') {
                document.getElementById('tab-content-scan').style.display = 'block';
                document.getElementById('tab-content-leader').style.display = 'none';
                document.getElementById('tab-scan').classList.add('active');
                document.getElementById('tab-leader').classList.remove('active');
                if(!currentStream) initCamera();
            } else {
                document.getElementById('tab-content-scan').style.display = 'none';
                document.getElementById('tab-content-leader').style.display = 'block';
                document.getElementById('tab-scan').classList.remove('active');
                document.getElementById('tab-leader').classList.add('active');
                if(currentStream) {
                    currentStream.getTracks().forEach(t => t.stop());
                    currentStream = null;
                }
                chargerClassement();
            }
        }

        // --- NOUVEAU SYSTÈME AVEC MOT DE PASSE ---
        async function inscription() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            const status = document.getElementById('auth-status');
            status.style.display = 'block';
            status.className = "status-panel";
            status.innerText = "Création du compte... ⏳";

            if(!email || !password) { status.className="status-panel error"; status.innerText="Veuillez remplir l'email et le mot de passe."; return; }
            if(password.length < 6) { status.className="status-panel error"; status.innerText="Le mot de passe doit faire au moins 6 caractères."; return; }

            const { data, error } = await supabaseClient.auth.signUp({ email, password });

            if(error) {
                status.className="status-panel error";
                status.innerText = "Erreur : " + error.message;
            } else {
                status.className="status-panel success";
                status.innerText = "Compte créé avec succès ! Connexion automatique...";
                userSession = data.user;
                setTimeout(() => { demarrerJeu(); }, 1200);
            }
        }

        async function connexion() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            const status = document.getElementById('auth-status');
            status.style.display = 'block';
            status.className = "status-panel";
            status.innerText = "Vérification des identifiants... ⏳";

            if(!email || !password) { status.className="status-panel error"; status.innerText="Veuillez entrer votre email et mot de passe."; return; }

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if(error) {
                status.className="status-panel error";
                status.innerText = "Erreur : " + error.message;
            } else {
                status.className="status-panel success";
                status.innerText = "Ravi de vous revoir !";
                userSession = data.user;
                setTimeout(() => { demarrerJeu(); }, 1000);
            }
        }

        async function deconnexion() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        async function demarrerJeu() {
            document.getElementById('user-tag').innerText = `Joueur : ${userSession.email}`;
            changerEcran('screen-game');
            
            const { data, error } = await supabaseClient.from('profiles').select('score').eq('id', userSession.id).single();
            if(data) {
                myScore = data.score;
                document.getElementById('score-display').innerText = myScore;
            }
            initCamera();
        }

        async function initCamera() {
            try {
                const constraints = { video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } } };
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                statusBox.className = "status-panel";
                statusBox.innerText = "Caméra active ! Cadre ton composant et scanne.";
            } catch (err) {
                statusBox.className = "status-panel error";
                statusBox.innerText = "Erreur d'accès à la caméra.";
            }
        }

        async function capturerEtAnalyser() {
            if (!currentStream) return;

            canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 480;
            let ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let base64Data = canvas.toDataURL('image/jpeg').split(',')[1];

            photoPreview.src = canvas.toDataURL('image/jpeg');
            video.style.display = 'none'; photoPreview.style.display = 'block';

            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;

            scanBtn.style.display = 'none'; resetBtn.style.display = 'block';
            statusBox.className = "status-panel"; statusBox.innerText = "Analyse Gemini AI... ⏳";

            const prompt = "Analyse cette image. Si tu distingues clairement une carte programmable (Arduino Uno, Nano, Mega, ESP32, Raspberry Pi Pico) ou un module/capteur électronique identifiable, réponds STRICTEMENT avec son nom usuel de manière concise (max 4 mots). Si l'élément n'est pas un composant électronique bien défini, réponds par le mot unique : INCONNU";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

            try {
                let response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }],
                        generationConfig: { temperature: 0.1 }
                    })
                });
                let data = await response.json();
                processVisionResult(data.candidates[0].content.parts[0].text.trim());
            } catch (e) {
                statusBox.className = "status-panel error"; statusBox.innerText = "Erreur lors de l'analyse.";
            }
        }

        async function processVisionResult(rawText) {
            let cleanedName = rawText.replace(/[\*#_]/g, '').trim();

            if (cleanedName.toUpperCase().includes("INCONNU") || cleanedName.length < 2) {
                statusBox.className = "status-panel error";
                statusBox.innerText = "❌ Composant non détecté.";
            } else {
                statusBox.className = "status-panel success";
                if (!objetsScannes.has(cleanedName)) {
                    objetsScannes.add(cleanedName);
                    myScore += 100;
                    
                    document.getElementById('score-display').innerText = myScore;
                    document.getElementById('count-display').innerText = objetsScannes.size;
                    statusBox.innerHTML = `🎉 <strong>Nouveau !</strong> +100 pts : <em>${cleanedName}</em>`;

                    await supabaseClient.from('profiles').update({ score: myScore }).eq('id', userSession.id);
                } else {
                    statusBox.innerHTML = `🔍 <strong>Déjà scanné :</strong> ${cleanedName}`;
                }
            }
        }

        async function chargerClassement() {
            const body = document.getElementById('leaderboard-body');
            body.innerHTML = "<tr><td colspan='3'>Chargement du TOP mondial...</td></tr>";

            const { data, error } = await supabaseClient.from('profiles').select('email, score').order('score', { ascending: false }).limit(10);

            if(error) { body.innerHTML = "<tr><td colspan='3'>Erreur de chargement.</td></tr>"; return;}

            body.innerHTML = "";
            data.forEach((row, index) => {
                let split = row.email.split('@');
                let anonymizedEmail = split[0].substring(0,2) + "**@" + split[1];

                body.innerHTML += `
                    <tr>
                        <td>#${index + 1}</td>
                        <td>${anonymizedEmail} ${row.email === userSession.email ? '<strong>(Moi)</strong>' : ''}</td>
                        <td><strong>${row.score}</strong> pts</td>
                    </tr>
                `;
            });
        }

        async function relancerCamera() {
            photoPreview.style.display = 'none'; video.style.display = 'block';
            resetBtn.style.display = 'none'; scanBtn.style.display = 'block';
            await initCamera();
        }

        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) { userSession = session.user; demarrerJeu(); }
        });
    </script>
</body>
</html>
